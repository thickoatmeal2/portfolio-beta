<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="250" fill="#0a0a0a"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="380" height="230" fill="none" stroke="#2a2a2a" stroke-width="2" rx="8"/>
  
  <!-- Title -->
  <text x="200" y="80" font-family="monospace" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">universal</text>
  <text x="200" y="115" font-family="monospace" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">tuner</text>
  
  <!-- Accent line -->
  <line x1="80" y1="135" x2="320" y2="135" stroke="#3d5afe" stroke-width="1"/>
  
  <!-- Hz indicator -->
  <text x="200" y="170" font-family="monospace" font-size="20" fill="#4ade80" text-anchor="middle">72.3 Hz</text>
  
  <!-- Button accent -->
  <circle cx="200" cy="210" r="15" fill="#ef4444" opacity="0.6"/>
  <text x="200" y="216" font-family="monospace" font-size="12" fill="#ffffff" text-anchor="middle">◆</text>
</svg>